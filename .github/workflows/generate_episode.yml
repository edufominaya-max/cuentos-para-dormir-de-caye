name: 🌙 Generar episodio semanal — Cuentos para dormir de Caye
on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      skip_audio:
        description: 'Omitir generación de voces (ElevenLabs)'
        required: false
        default: 'false'
        type: boolean
      skip_music:
        description: 'Omitir generación de música y canciones (Suno)'
        required: false
        default: 'false'
        type: boolean
      skip_cover:
        description: 'Omitir generación de carátula'
        required: false
        default: 'false'
        type: boolean
      skip_mix:
        description: 'Omitir mezcla final (FFmpeg)'
        required: false
        default: 'false'
        type: boolean
jobs:
  generate-episode:
    name: Generar episodio
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: 📦 Instalar dependencias Python
        run: pip install anthropic openai requests pillow pydub mutagen elevenlabs
      - name: 🔧 Instalar FFmpeg
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg
      - name: 📝 Calcular número de episodio
        id: episode_num
        run: |
          COUNT=$(find logs/ -name "episode_*.json" 2>/dev/null | wc -l)
          NEXT=$((COUNT + 1))
          echo "episode_number=$NEXT" >> $GITHUB_OUTPUT
          echo "Próximo episodio: $NEXT"
      - name: 🌙 Paso 1 — Generar guión con Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python run_episode.py --episode ${{ steps.episode_num.outputs.episode_number }}
      - name: 🎙️ Paso 2 — Generar voces con ElevenLabs
        if: ${{ github.event.inputs.skip_audio != 'true' }}
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: python generate_audio.py --all
      - name: 🎵 Paso 3 — Generar sintonía y canciones con Suno
        if: ${{ github.event.inputs.skip_music != 'true' }}
        env:
          APIPASS_KEY: ${{ secrets.APIPASS_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          if [ ! -f "music/jingle/intro.mp3" ]; then
            python generate_music.py --jingle
          fi
          python generate_music.py --all
      - name: 🎚️ Paso 4 — Mezcla final con FFmpeg
        if: ${{ github.event.inputs.skip_mix != 'true' }}
        run: python mix_audio.py --all
      - name: 📡 Paso 5 — Actualizar RSS feed
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python upload_podcast.py
      - name: 💾 Commit y push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Caye Bot 🌙"
          git add -A
          if git diff --staged --quiet; then
            echo "No hay cambios nuevos"
          else
            git commit -m "🌙 Episodio ${{ steps.episode_num.outputs.episode_number }} — $(date '+%d/%m/%Y')"
            git push
          fi
      - name: 📊 Resumen
        run: |
          echo "## 🌙 Episodio ${{ steps.episode_num.outputs.episode_number }} generado" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Fecha | $(date '+%d/%m/%Y %H:%M') |" >> $GITHUB_STEP_SUMMARY
          echo "| Voces | ElevenLabs ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Música | Suno ✅ |" >> $GITHUB_STEP_SUMMARY
